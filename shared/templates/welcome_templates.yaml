# ─────────────────────────────────────────────────────────────────────────────
# PSPT — Welcome Email Templates
# Each entry is a standalone welcome template keyed by `sku_key`.
#
# sku_key       : matches the Product value from DRS (used for auto-selection)
# display_name  : human-readable name shown in the UI picker
# variant_a     : PM/automated send — introduces the consultant in 3rd person
# variant_b     : Consultant-sent — consultant introduces themselves
#
# Placeholders auto-filled from data sources:
#   {CUSTOMER_CONTACT_NAME}   → SFDC contact name
#   {CONSULTANT_NAME}         → DRS project_manager / logged-in user
#   {CUSTOMER}                → DRS customer name
#   {PS_SUPPORT_EMAIL}        → auto-generated: ps-support+{CUSTOMER_SLUG}@zoneandco.com
#   {SENDER}                  → logged-in consultant name
#
# Placeholders requiring manual input (shown as editable fields in UI):
#   (none for welcome — fully auto-fillable)
#
# ss_milestone_on_send: Smartsheet field to write today's date when sent
# ─────────────────────────────────────────────────────────────────────────────

ss_milestone_on_send: "Intro. Email Sent"

templates:

  - sku_key: "ZoneCapture"
    display_name: "ZoneCapture"
    subject: "Welcome to ZoneCapture!"
    variant_a:
      intro: "I'm delighted to introduce your dedicated consultant, {CONSULTANT_NAME}, who will be your main point of contact throughout the project."
      body: |
        Hi {CUSTOMER_CONTACT_NAME} and team,

        It's a pleasure to meet you — and a very warm welcome to ZoneCapture!

        I'm delighted to introduce your dedicated consultant, {CONSULTANT_NAME}, who will be your main point of contact throughout the project.

        YOUR PROJECT JOURNEY

        What to Expect
        Your implementation includes (3) ZoneCapture dedicated consulting sessions. For additional details, please see the ZoneApps Scope documentation, which provides additional insight to delivery methodology, in-scope activities and associated timelines.

        Before We Begin
        To help us get started smoothly, please complete the following:

        NetSuite Environment
        • Provide admin access to your NetSuite environment using this email address: {PS_SUPPORT_EMAIL}

        ZoneCapture
        • Complete the required Requirements Form with details of your business requirements and setup preferences
        • Additional preparation guidance can be found here

        Key Resources
        • ZCapture Project Plan — view tasks, approx. timelines, and responsibilities for the implementation
        • ZoneCapture Knowledge Base — explore product documentation and FAQs

        Please note: Our standard implementation timeline is approx. 6–8 weeks, or 7–10 weeks when multiple products are being implemented. For customers seeking to accelerate delivery, we offer a Premium upgrade option and/or the flexibility to engage additional services on a T&M basis.

        Next Steps
        Once we've received the above, our team will review your requirement details and begin the Configuration Phase, which typically takes approx. 1–2 weeks (as outlined in your project plan). Our team will then reach out to schedule your Enablement Session.

        In the meantime, please don't hesitate to reach out with any questions — we're excited to partner with you and support your success with ZoneCapture!

        Looking forward to working together,

        Kind regards,
        {SENDER}
        Professional Services | Zone & Co
