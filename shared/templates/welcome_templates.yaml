  - sku_key: "ZoneApprovals"
    display_name: "ZoneApprovals"
    subject: "Welcome to ZoneApprovals!"
    sessions_table:
      - session: "Enablement"
        duration: "1.5–2 hrs"
        focus: "Intro to system, Approval hierarchy & matrices, portlet processing, etc."
      - session: "Workshop / Q&A #1"
        duration: "1 hr"
        focus: "UAT progress check-in, customer-led discussion + Q&A"
      - session: "Workshop / Q&A #2"
        duration: "1 hr"
        focus: "Follow-up UAT progress check-in, optimize setup + Q&A"
    variant_a:
      body: |
        Hi {CUSTOMER_CONTACT_NAME} and team,

        It's a pleasure to meet you — and a very warm welcome to ZoneApprovals!

        I'm delighted to introduce your dedicated consultant, {CONSULTANT_NAME}, who will be your main point of contact throughout the project.

        YOUR PROJECT JOURNEY

        What to Expect
        Your implementation includes (3) ZoneApprovals dedicated consulting sessions. For additional details, please see the ZoneApps Scope documentation, which provides additional insight to delivery methodology, in-scope activities and associated timelines.

        Before We Begin
        To help us get started smoothly, please complete the following:

        NetSuite Environment
        • Provide admin access to your NetSuite environment using this email address: {PS_SUPPORT_EMAIL}

        ZoneApprovals
        • Confirm one transaction type for configuration in your Sandbox account (e.g., Vendor Bill) — view the list of Supported Record Types
        • If a workflow already exists for the selected transaction type, remove or disable it to prevent conflicts with ZoneApprovals
        • Ensure the required NetSuite dependencies and Approval Routing are enabled for the selected transaction type (Setup → Accounting → Set Up Accounting)
        • Additional preparation guidance can be found here

        Key Resources
        • ZApprovals Project Plan — view tasks, approx. timelines, and responsibilities for the implementation
        • ZoneApprovals Knowledge Base — learn about ZoneApprovals functionality and configuration options

        Please note: Our standard implementation timeline is approx. 6–8 weeks, or 7–9 weeks when multiple products are being implemented. For customers seeking to accelerate delivery, we offer a Premium upgrade option and/or the flexibility to engage additional services on a T&M basis.

