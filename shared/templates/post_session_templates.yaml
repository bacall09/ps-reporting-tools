          Primary Scenario(s): {PRIMARY_SCENARIOS}
          Transaction Types Configured: {TRANSACTION_TYPES}
          Subsidiaries in Scope: {SUBSIDIARIES}
          Additional Notes: {SESSION_NOTES}

          If anything above doesn't look right, please let us know so we can adjust before you begin testing.

          Session Recording
          {RECORDING_LINK}

          Testing & Configuration Guide
          To support your testing phase, please review the ZoneApprovals Post-Enablement Testing Guide, which covers everything you'll need to configure and validate ZoneApprovals in Sandbox. Key areas include:
          • Adjusting user roles and permissions
          • Creating Approval Configurations, Hierarchy levels, and Matrix
          • Testing Approval by email in Sandbox
          • Configuring email templates and Dashboard Portlets
